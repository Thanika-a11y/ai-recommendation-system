<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartRecommend AI</title>

  <link rel="stylesheet" href="style.css"/>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>
<body>

<div class="loader" id="loader">
  <div class="spinner"></div>
  <h2>Loading SmartRecommend AI...</h2>
</div>

<canvas id="particles"></canvas>

<nav class="navbar">

  <div class="logo">
    SmartRecommend AI
  </div>

  <div class="nav-actions">

    <button id="themeToggle">
      🌙
    </button>

  </div>

</nav>

<section class="hero">

  <div class="hero-content">

    <h1>
      Discover Perfect Recommendations with AI
    </h1>

    <p>
      Movies, Anime, Books, Music, Courses, Games & More
    </p>

    <div class="search-box">

      <input
        type="text"
        id="searchInput"
        placeholder="Search recommendations..."
      />

      <button id="searchBtn">
        Search
      </button>

    </div>

  </div>

</section>

<section class="controls">

  <div class="filters">

    <button class="filter-btn active" data-category="all">
      All
    </button>

    <button class="filter-btn" data-category="movies">
      Movies
    </button>

    <button class="filter-btn" data-category="anime">
      Anime
    </button>

    <button class="filter-btn" data-category="books">
      Books
    </button>

    <button class="filter-btn" data-category="games">
      Games
    </button>

    <button class="filter-btn" data-category="music">
      Music
    </button>

  </div>

  <select id="sortSelect">

    <option value="rating">
      Sort by Rating
    </option>

    <option value="popularity">
      Sort by Popularity
    </option>

  </select>

</section>

<section class="recommendations">

  <h2>
    Trending Recommendations
  </h2>

  <div class="cards" id="cardsContainer">

  </div>

</section>

<div class="modal" id="detailModal">

  <div class="modal-content">

    <span class="close-btn" id="closeModal">
      &times;
    </span>

    <div class="modal-body" id="modalBody">

    </div>

  </div>

</div>

<div class="toast" id="toast">
  Added to Favorites
</div>

<script src="script.js"></script>

</body>
</html>
