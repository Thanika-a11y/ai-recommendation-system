<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 Ultimate AI Recommendation System</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:
linear-gradient(135deg,#0f172a,#1e1b4b,#312e81);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:30px;

}

.container{

width:95%;
max-width:1300px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(15px);

padding:35px;

border-radius:30px;

box-shadow:0 0 40px cyan;

text-align:center;

}

h1{

font-size:4rem;
color:#00ffff;

text-shadow:0 0 20px cyan;

margin-bottom:15px;

}

.subtitle{

color:white;
font-size:1.2rem;

margin-bottom:30px;

}

.top{

display:flex;
gap:20px;
flex-wrap:wrap;

margin-bottom:30px;

}

select{

flex:1;

padding:18px;

font-size:1rem;

border:none;

border-radius:15px;

outline:none;

}

button{

padding:18px 40px;

border:none;

border-radius:15px;

background:#00ffff;

font-size:1rem;

font-weight:bold;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 20px cyan;

}

button:hover{

transform:scale(1.05);

background:white;

}

.result{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));

gap:25px;

margin-top:40px;

}

.card{

background:rgba(255,255,255,0.1);

border-radius:25px;

overflow:hidden;

box-shadow:0 0 20px rgba(255,255,255,0.1);

transition:0.4s;

}

.card:hover{

transform:translateY(-10px);

box-shadow:0 0 30px cyan;

}

.card img{

width:100%;
height:240px;
object-fit:cover;

}

.content{

padding:20px;
color:white;

}

.content h2{

font-size:1.8rem;

margin-bottom:10px;

}

.rating{

color:gold;

margin-bottom:10px;

font-size:1.1rem;

}

.info{

text-align:left;

line-height:1.9;

background:rgba(255,255,255,0.08);

padding:15px;

border-radius:15px;

margin-top:15px;

}

.buttons{

margin-top:20px;

display:flex;
justify-content:center;
gap:10px;

flex-wrap:wrap;

}

.buttons button{

padding:10px 18px;

font-size:0.9rem;

}

.footer{

margin-top:40px;

color:white;

opacity:0.7;

}

</style>

</head>

<body>

<div class="container">

<h1>🤖 AI Recommendation</h1>

<p class="subtitle">

Choose category and discover amazing recommendations ✨

</p>

<div class="top">

<select id="category">

<option value="">🎯 Select Category</option>

<option value="movies">🎬 Movies</option>

<option value="anime">🔥 Anime</option>

<option value="games">🎮 Games</option>

<option value="music">🎵 Music</option>

<option value="cars">🚗 Cars</option>

<option value="food">🍕 Food</option>

<option value="technology">💻 Technology</option>

<option value="travel">✈️ Travel</option>

</select>

<button onclick="showRecommendations()">

🚀 Recommend

</button>

</div>

<div class="result" id="result"></div>

<div class="footer">

✨ Developed By Thanika

</div>

</div>

<script>

function showRecommendations(){

const category =
document.getElementById("category").value;

const result =
document.getElementById("result");

let data = [];

if(category === "movies"){

data = [

{

title:"Interstellar",

image:"https://images.unsplash.com/photo-1489599849927-2ee91cede3ba",

rating:"⭐⭐⭐⭐⭐ 9.5",

genre:"Sci-Fi",

year:"2014",

director:"Christopher Nolan",

time:"2h 49m",

desc:"A breathtaking journey through space and time.",

review:"One of the greatest science-fiction movies ever made."

},

{

title:"Avengers Endgame",

image:"https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c",

rating:"⭐⭐⭐⭐⭐ 9.2",

genre:"Action",

year:"2019",

director:"Marvel Studios",

time:"3h 2m",

desc:"Epic superhero battle saving the universe.",

review:"Massive action and emotional ending."

}

];

}

else if(category === "anime"){

data = [

{

title:"Naruto",

image:"https://images.unsplash.com/photo-1541560052-77ec1bbc09f7",

rating:"⭐⭐⭐⭐⭐ 9.4",

genre:"Adventure",

year:"2002",

director:"Masashi Kishimoto",

time:"720 Episodes",

desc:"Story of a ninja becoming Hokage.",

review:"Inspirational and emotional anime."

},

{

title:"Demon Slayer",

image:"https://images.unsplash.com/photo-1578632767115-351597cf2477",

rating:"⭐⭐⭐⭐⭐ 9.5",

genre:"Action",

year:"2019",

director:"Ufotable",

time:"44 Episodes",

desc:"Beautiful animation with intense fights.",

review:"Visually stunning anime series."

}

];

}

else if(category === "games"){

data = [

{

title:"GTA V",

image:"https://images.unsplash.com/photo-1511512578047-dfb367046420",

rating:"⭐⭐⭐⭐⭐ 9.7",

genre:"Open World",

year:"2013",

director:"Rockstar Games",

time:"100+ Hours",

desc:"Massive open-world action game.",

review:"Legendary gameplay and freedom."

},

{

title:"Minecraft",

image:"https://images.unsplash.com/photo-1493711662062-fa541adb3fc8",

rating:"⭐⭐⭐⭐⭐ 9.4",

genre:"Sandbox",

year:"2011",

director:"Mojang",

time:"Unlimited",

desc:"Creative building and survival game.",

review:"Loved by millions worldwide."

}

];

}

else if(category === "music"){

data = [

{

title:"Believer",

image:"https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f",

rating:"⭐⭐⭐⭐⭐ 9.3",

genre:"Rock",

year:"2017",

director:"Imagine Dragons",

time:"3m 24s",

desc:"Powerful motivational song.",

review:"Energetic and inspiring."

},

{

title:"Faded",

image:"https://images.unsplash.com/photo-1511379938547-c1f69419868d",

rating:"⭐⭐⭐⭐⭐ 9.1",

genre:"EDM",

year:"2015",

director:"Alan Walker",

time:"3m 32s",

desc:"Emotional electronic music masterpiece.",

review:"Beautiful melody and vocals."

}

];

}

else if(category === "cars"){

data = [

{

title:"Lamborghini Aventador",

image:"https://images.unsplash.com/photo-1503376780353-7e6692767b70",

rating:"⭐⭐⭐⭐⭐ 9.8",

genre:"Supercar",

year:"2025",

director:"Lamborghini",

time:"350 km/h",

desc:"Luxury performance supercar.",

review:"Extremely stylish and powerful."

},

{

title:"Tesla Model S",

image:"https://images.unsplash.com/photo-1492144534655-ae79c964c9d7",

rating:"⭐⭐⭐⭐⭐ 9.5",

genre:"Electric",

year:"2025",

director:"Tesla",

time:"AI Assisted",

desc:"Future electric smart car.",

review:"Modern technology and comfort."

}

];

}

else{

result.innerHTML =

"<h2 style='color:white;'>⚠️ Please Select Category</h2>";

return;

}

let output = "";

data.forEach(item=>{

output += `

<div class="card">

<img src="${item.image}">

<div class="content">

<h2>${item.title}</h2>

<div class="rating">
${item.rating}
</div>

<p>${item.desc}</p>

<div class="info">

<p>🎭 Genre: ${item.genre}</p>

<p>📅 Release: ${item.year}</p>

<p>🎬 Creator: ${item.director}</p>

<p>⏱ Duration: ${item.time}</p>

<p>🌍 Availability: Worldwide</p>

<p>🔥 Trending Score: 98%</p>

<p>💡 Review: ${item.review}</p>

<p>⭐ AI Recommended because users love this category.</p>

</div>

<div class="buttons">

<button onclick="
alert('Opening ${item.title}')
">

⭐ Explore

</button>

<button onclick="
alert('${item.title} saved ❤️')
">

❤️ Save

</button>

<button onclick="
alert('Sharing ${item.title}')
">

📤 Share

</button>

</div>

</div>

</div>

`;

});

result.innerHTML = output;

}

</script>

</body>

</html>
