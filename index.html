<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 Ultimate AI Recommendation System</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:
linear-gradient(
135deg,
#0f172a,
#1e1b4b,
#312e81,
#0f172a
);

background-size:400% 400%;

animation:bgMove 12s infinite alternate;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

overflow:auto;

}

@keyframes bgMove{

0%{
background-position:left;
}

100%{
background-position:right;
}

}

.container{

width:95%;
max-width:1200px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(15px);

padding:35px;

border-radius:30px;

box-shadow:0 0 40px rgba(0,255,255,0.4);

text-align:center;

animation:fadeIn 1s ease;

}

@keyframes fadeIn{

from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:translateY(0);

}

}

h1{

font-size:4rem;

color:#00ffff;

margin-bottom:10px;

text-shadow:0 0 20px #00ffff;

}

.subtitle{

color:white;

font-size:1.2rem;

margin-bottom:30px;

}

.search-box{

display:flex;

gap:15px;

margin-bottom:30px;

flex-wrap:wrap;

}

select,input{

flex:1;

padding:18px;

border:none;

border-radius:15px;

font-size:1rem;

outline:none;

}

button{

padding:18px 35px;

border:none;

border-radius:15px;

background:#00ffff;

font-size:1rem;

font-weight:bold;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 20px #00ffff;

}

button:hover{

transform:scale(1.05);

background:white;

}

.result{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));

gap:25px;

margin-top:35px;

}

.card{

background:rgba(255,255,255,0.12);

border-radius:25px;

overflow:hidden;

transition:0.4s;

box-shadow:0 0 20px rgba(255,255,255,0.1);

position:relative;

}

.card:hover{

transform:translateY(-12px) scale(1.03);

box-shadow:0 0 30px #00ffff;

}

.card img{

width:100%;
height:230px;
object-fit:cover;

}

.card-content{

padding:22px;

color:white;

}

.card h2{

margin-bottom:10px;

font-size:1.6rem;

}

.rating{

margin:10px 0;

color:gold;

font-size:1.1rem;

}

.card p{

font-size:0.96rem;

opacity:0.88;

line-height:1.6;

}

.details{

margin-top:18px;

text-align:left;

background:rgba(255,255,255,0.08);

padding:15px;

border-radius:15px;

line-height:1.9;

font-size:0.94rem;

}

.card-buttons{

margin-top:20px;

display:flex;

justify-content:center;

gap:10px;

flex-wrap:wrap;

}

.card-buttons button{

padding:10px 18px;

font-size:0.9rem;

}

.footer{

margin-top:40px;

color:white;

opacity:0.7;

}

</style>

</head>

<body>

<div class="container">

<h1>🤖 AI Recommendation</h1>

<p class="subtitle">

Discover premium personalized recommendations powered by Artificial Intelligence ✨

</p>

<div class="search-box">

<select id="category">

<option value="">🔍 Select Category</option>

<option value="movies">🎬 Movies</option>

<option value="anime">🔥 Anime</option>

<option value="games">🎮 Games</option>

<option value="music">🎵 Music</option>

<option value="cars">🚗 Cars</option>

<option value="travel">✈️ Travel</option>

<option value="technology">💻 Technology</option>

<option value="food">🍕 Food</option>

<option value="fashion">👗 Fashion</option>

<option value="fitness">🏋️ Fitness</option>

</select>

<input type="text"
id="username"
placeholder="Enter your name...">

<button onclick="recommendItems()">

🚀 Recommend

</button>

</div>

<div class="result" id="result"></div>

<div class="footer">

✨ Ultimate AI Recommendation System • Developed By Thanika

</div>

</div>

<script>

function recommendItems(){

const category =
document.getElementById("category").value;

const username =
document.getElementById("username").value || "User";

const result =
document.getElementById("result");

let data = [];

if(category === "movies"){

data = [

{

title:"Interstellar",

image:"https://images.unsplash.com/photo-1489599849927-2ee91cede3ba",

rating:"⭐⭐⭐⭐⭐ 9.5",

desc:"A mind-blowing sci-fi adventure through space and time."

},

{

title:"Avengers Endgame",

image:"https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c",

rating:"⭐⭐⭐⭐⭐ 9.2",

desc:"Epic superhero battle with emotional storytelling."

}

];

}

else if(category === "anime"){

data = [

{

title:"Demon Slayer",

image:"https://images.unsplash.com/photo-1578632767115-351597cf2477",

rating:"⭐⭐⭐⭐⭐ 9.4",

desc:"Action-packed anime with stunning visuals."

},

{

title:"Naruto",

image:"https://images.unsplash.com/photo-1541560052-77ec1bbc09f7",

rating:"⭐⭐⭐⭐⭐ 9.1",

desc:"Legendary ninja adventure full of inspiration."

}

];

}

else if(category === "games"){

data = [

{

title:"GTA V",

image:"https://images.unsplash.com/photo-1511512578047-dfb367046420",

rating:"⭐⭐⭐⭐⭐ 9.6",

desc:"Open-world action game with endless possibilities."

},

{

title:"Minecraft",

image:"https://images.unsplash.com/photo-1493711662062-fa541adb3fc8",

rating:"⭐⭐⭐⭐⭐ 9.0",

desc:"Creative sandbox game loved worldwide."

}

];

}

else if(category === "music"){

data = [

{

title:"Believer",

image:"https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f",

rating:"⭐⭐⭐⭐⭐ 9.3",

desc:"Energetic music with powerful motivation."

},

{

title:"Faded",

image:"https://images.unsplash.com/photo-1511379938547-c1f69419868d",

rating:"⭐⭐⭐⭐⭐ 9.1",

desc:"Emotional EDM masterpiece loved globally."

}

];

}

else if(category === "cars"){

data = [

{

title:"Lamborghini",

image:"https://images.unsplash.com/photo-1503376780353-7e6692767b70",

rating:"⭐⭐⭐⭐⭐ 9.7",

desc:"Luxury supercar with extreme performance."

},

{

title:"Tesla Model S",

image:"https://images.unsplash.com/photo-1492144534655-ae79c964c9d7",

rating:"⭐⭐⭐⭐⭐ 9.4",

desc:"Future electric vehicle with smart AI features."

}

];

}

else if(category === "travel"){

data = [

{

title:"Maldives",

image:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e",

rating:"⭐⭐⭐⭐⭐ 9.8",

desc:"Beautiful tropical paradise with crystal waters."

},

{

title:"Switzerland",

image:"https://images.unsplash.com/photo-1506744038136-46273834b3fb",

rating:"⭐⭐⭐⭐⭐ 9.6",

desc:"Snow mountains and peaceful scenery."

}

];

}

else if(category === "technology"){

data = [

{

title:"Artificial Intelligence",

image:"https://images.unsplash.com/photo-1485827404703-89b55fcc595e",

rating:"⭐⭐⭐⭐⭐ 9.9",

desc:"Future-changing AI technology revolutionizing industries."

},

{

title:"Cyber Security",

image:"https://images.unsplash.com/photo-1516321318423-f06f85e504b3",

rating:"⭐⭐⭐⭐⭐ 9.4",

desc:"Protecting systems and digital information worldwide."

}

];

}

else{

result.innerHTML =

`<h2 style="color:white;">
⚠️ Please select category first
</h2>`;

return;

}

let output =

`<h2 style="
color:white;
margin-bottom:30px;
grid-column:1/-1;
">

✨ Recommendations For ${username}

</h2>`;

data.forEach(item=>{

output += `

<div class="card">

<img src="${item.image}">

<div class="card-content">

<h2>${item.title}</h2>

<div class="rating">
${item.rating}
</div>

<p>
${item.desc}
</p>

<div class="details">

<p>🎯 Category: ${category}</p>

<p>🔥 Popularity: Trending Worldwide</p>

<p>⭐ AI Match Score: 98%</p>

<p>👥 Recommended For: ${username}</p>

<p>📅 Release Year: 2025 Edition</p>

<p>🌍 Availability: Global</p>

<p>💡 AI Insight:
Highly personalized recommendation based on your selected interests and AI trend analysis.</p>

<p>🚀 Why Recommended?
Users with similar interests loved this recommendation.</p>

</div>

<div class="card-buttons">

<button onclick="
alert('Opening ${item.title} details...')
">

⭐ Explore

</button>

<button onclick="
alert('${item.title} added to favorites ❤️')
">

❤️ Save

</button>

<button onclick="
alert('Sharing ${item.title}...')
">

📤 Share

</button>

</div>

</div>

</div>

`;

});

result.innerHTML = output;

}

</script>

</body>

</html>
